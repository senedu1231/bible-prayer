<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>🙏 고민·기도제목 → 구절 추천 + 기도문</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --radius: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
    }
    
    body {
      margin: 0;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .hero {
      text-align: center;
      margin-bottom: 24px;
    }
    .hero h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #1e293b;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
      background: #f1f5f9;
      padding: 8px 16px;
      border-radius: 999px;
      font-weight: 500;
      box-shadow: var(--shadow-sm);
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      padding: 24px 20px;
      margin-bottom: 20px;
    }
    
    .card h2 { 
      margin: 0 0 12px; 
      font-size: 16px; 
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    textarea {
      width: 100%;
      box-sizing: border-box;
      min-height: 140px;
      resize: vertical;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: #f8fafc;
      color: var(--text);
      padding: 16px;
      font-size: 15px;
      line-height: 1.6;
      outline: none;
      transition: all 0.2s;
    }
    textarea:focus { 
      border-color: var(--primary); 
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); 
    }
    textarea::placeholder { color: #94a3b8; }

    .btnbar { 
      display: flex; 
      gap: 10px; 
      margin-top: 16px; 
    }
    button {
      appearance: none;
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text);
      padding: 14px;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 600;
      font-size: 15px;
      display: inline-flex; 
      justify-content: center;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
      flex: 1;
    }
    button:active { transform: scale(0.98); }
    button.primary {
      border: none;
      background: var(--primary);
      color: #ffffff;
      flex: 2; /* 추천받기 버튼 강조 */
    }
    button.primary:hover { background: var(--primary-hover); }
    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* 빙글빙글 로딩 애니메이션 */
    .spinner {
      border: 3px solid rgba(0,0,0,0.1);
      border-top-color: var(--primary);
      border-radius: 50%;
      width: 14px;
      height: 14px;
      animation: spin 1s linear infinite;
      display: none; /* 평소엔 숨김 */
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .status {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
      display: flex; 
      align-items: center; 
      justify-content: center;
      gap: 8px;
      font-weight: 500;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #cbd5e1; }
    .dot.ok { background: #10b981; }
    .dot.warn { background: #f59e0b; }
    .dot.bad { background: #ef4444; }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    .out { margin-top: 12px; display: flex; flex-direction: column; gap: 12px; }
    
    /* 성경구절 & 기도문 공통 예쁜 배경 */
    .verse {
      background: #f8fafc;
      border-radius: 16px;
      padding: 18px;
      border: 1px solid #e2e8f0;
    }
    .ref { font-weight: 800; color: var(--primary); font-size: 16px; margin-bottom: 8px; }
    .text { font-size: 15px; line-height: 1.6; color: var(--text); margin-bottom: 12px; font-weight: 500; white-space: pre-wrap; }
    .why { color: #475569; line-height: 1.6; font-size: 14px; background: #ffffff; padding: 12px; border-radius: 12px; margin-top: 8px;}

    .actions { display: flex; gap: 10px; margin-top: 16px; }
    .actions button { padding: 12px; font-size: 14px; background: #f1f5f9; border: none; color: #475569; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 30px;
      transform: translateX(-50%) translateY(20px);
      background: rgba(15, 23, 42, 0.9);
      color: #fff;
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 380px) {
      .btnbar { flex-direction: column; }
      button { width: 100%; }
      .actions { flex-direction: column; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="hero">
      <h1>🙏 말씀을 통한 기도</h1>
      <div class="pill">🔒 안심하세요! 작성하신 내용은 서버에 저장되지 않아요.</div>
    </div>

    <div class="card">
      <h2>🕊️ 나의 고민/기도제목</h2>
      <textarea id="inputText" placeholder="예) 요즘 선택을 앞두고 두려움이 큽니다. 가족에게 말이 날카로워져서 마음이 무겁습니다. 평안을 얻고 싶어요."></textarea>

      <div class="btnbar">
        <button class="primary" id="btnGo">📖 말씀 추천받기</button>
        <button id="btnSample">✨ 예시</button>
        <button id="btnClear">🧹 지우기</button>
      </div>

      <div class="status" id="status">
        <span class="spinner" id="loadingSpinner"></span>
        <span class="dot" id="statusDot"></span>
        <span id="statusText">말씀과 기도를 기다리고 있어요</span>
      </div>

      <div class="divider"></div>

      <h2>📖 추천 성경 구절</h2>
      <div class="out" id="outputVerses">
        <div class="verse"><div class="why" style="background:transparent; padding:0; border:none;">아직 결과가 없습니다.</div></div>
      </div>

      <div class="actions">
        <button id="btnCopyAll" disabled>📋 결과 전체 복사하기</button>
      </div>

      <div class="divider"></div>

      <h2>🙏 기도문</h2>
      <div class="out" id="outputPrayer">
        <div class="verse"><div class="why" style="background:transparent; padding:0; border:none;">아직 결과가 없습니다.</div></div>
      </div>
    </div>
<div style="text-align: center; margin-top: 20px; font-size: 14px; color: var(--muted);">문의: bmchan1231@gmail.com</div>
  </div>
  <div class="toast" id="toast">복사되었습니다!</div>

<script>
  const WORKER_BASE = "https://bible-helper.hdh1231.workers.dev";

  const el = (id) => document.getElementById(id);
  const inputText = el("inputText");
  const statusDot = el("statusDot");
  const loadingSpinner = el("loadingSpinner");
  const statusText = el("statusText");
  const outputVerses = el("outputVerses");
  const outputPrayer = el("outputPrayer");
  const toast = el("toast");

  const btnGo = el("btnGo");
  const btnSample = el("btnSample");
  const btnClear = el("btnClear");
  const btnCopyAll = el("btnCopyAll");

  let latestPayload = null;

  function setStatus(kind, text, isLoading = false){
    if (isLoading) {
      statusDot.style.display = "none";
      loadingSpinner.style.display = "inline-block";
    } else {
      loadingSpinner.style.display = "none";
      statusDot.style.display = "inline-block";
      statusDot.className = "dot" + (kind ? " " + kind : "");
    }
    statusText.textContent = text;
  }
  
  function escapeHtml(s){
    return (s ?? "").toString().replace(/[&<>"']/g, (c)=>({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[c]));
  }
  
  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(()=>toast.classList.remove("show"), 1500);
  }

  function renderAll(data){
    const recs = data?.recommendations || [];
    outputVerses.innerHTML = "";
    
    if(!recs.length){
      outputVerses.innerHTML = `<div class="verse"><div class="why" style="background:transparent; padding:0; border:none;">결과가 비어 있습니다. 입력을 조금 더 구체화해 주세요.</div></div>`;
    } else {
      recs.forEach((it) => {
        // 라벨이 🔎 해설, 💡 실천으로 변경됨!
        outputVerses.insertAdjacentHTML("beforeend", `
          <div class="verse">
            <div class="ref">📌 ${escapeHtml(it.reference)}</div>
            ${it.text ? `<div class="text">“${escapeHtml(it.text)}”</div>` : ``}
            ${it.reason ? `<div class="why">🔎 <b>해설</b>: ${escapeHtml(it.reason)}</div>` : ``}
            ${it.application ? `<div class="why">💡 <b>실천</b>: ${escapeHtml(it.application)}</div>` : ``}
          </div>
        `);
      });
    }

    const prayer = (data?.prayer_text || "").trim();
    outputPrayer.innerHTML = "";
    
    if(!prayer){
      outputPrayer.innerHTML = `<div class="verse"><div class="why" style="background:transparent; padding:0; border:none;">기도문 결과가 비어 있습니다.</div></div>`;
    } else {
      // 기도문도 verse 클래스를 써서 구절이랑 똑같이 예쁜 회파란색 배경이 깔림!
      outputPrayer.innerHTML = `
        <div class="verse">
          <div class="text" style="margin:0;">${escapeHtml(prayer)}</div>
        </div>
      `;
    }

    const ok = recs.length && prayer.length;
    btnCopyAll.disabled = !ok;
  }

  function buildAllText(data){
    const recs = data?.recommendations || [];
    const prayer = (data?.prayer_text || "").trim();

    let s = "[추천 성경 구절]\n\n";
    recs.forEach((it) => {
      s += `📌 ${it.reference}\n`;
      if (it.text) s += `"${it.text}"\n\n`;
      if (it.reason) s += `- 해설: ${it.reason}\n`;
      if (it.application) s += `- 실천: ${it.application}\n`;
      s += "\n";
    });

    s += "------------------\n\n[나를 위한 기도문]\n\n";
    s += prayer;

    return s.trim();
  }

  async function postJSON(url, payload){
    const res = await fetch(url, {
      method:"POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    });
    if(!res.ok){
      const t = await res.text();
      throw new Error(`서버 오류(${res.status}): ${t.slice(0,100)}...`);
    }
    return await res.json();
  }

  btnSample.addEventListener("click", () => {
    inputText.value = `요즘 마음이 계속 불안합니다.\n중요한 결정을 앞두고 확신이 없고, 실패할까 두렵습니다.\n하나님 앞에서 다시 평안과 지혜를 얻고 싶습니다.`;
    inputText.focus();
  });

  btnClear.addEventListener("click", () => {
    inputText.value = "";
    latestPayload = null;
    outputVerses.innerHTML = `<div class="verse"><div class="why" style="background:transparent; padding:0; border:none;">아직 결과가 없습니다.</div></div>`;
    outputPrayer.innerHTML = `<div class="verse"><div class="why" style="background:transparent; padding:0; border:none;">아직 결과가 없습니다.</div></div>`;
    btnCopyAll.disabled = true;
    setStatus("", "말씀과 기도를 기다리고 있어요", false);
  });

  btnGo.addEventListener("click", async () => {
    const text = inputText.value.trim();
    if(!text){
      setStatus("warn","내용을 먼저 입력해 주세요!", false);
      inputText.focus();
      return;
    }

    btnGo.disabled = true;
    btnCopyAll.disabled = true;
    // 로딩 중일 때는 true를 줘서 빙글빙글 아이콘 띄우고, 감성 문구 출력!
    setStatus("", "말씀을 찾고, 기도를 적고 있어요...", true);

    try{
      const systemPrompt = `너는 따뜻한 기독교 목회자야. 사용자의 고민(기도제목)을 듣고, 가장 알맞은 성경 구절과 기도문을 아래 JSON 규칙에 맞게 작성해줘.

      [절대 지켜야 할 규칙]
      1. 토큰 낭비를 막기 위해 a4용지 찰만큼 길게 쓰지마. 적절한 길이.
      2. 기도문(prayer_text)은 구절 추천한 구절을 이용해서도 기도하고 고민내용관련해서도 기도해줘.
      3. 구절 추천(recommendations)은 고민,기도제목과 관련 있는 것으로 1~3개만 해. (해시태그 절대 금지)
      4. 본문(text)과 이유(reason), 적용(application)도 길게 쓰지 마.
      
      {
        "recommendations": [
          {
            "reference": "시편 23:1",
            "text": "여호와는 나의 목자시니 내게 부족함이 없으리로다",
            "reason": "마음이 불안할 때 하나님이 지켜주심을 기억하게 합니다.",
            "application": "모든 것을 하나님께 맡기는 연습을 해보세요."
          }
        ],
        "prayer_text": "사랑의 하나님, 제 마음을 지켜주세요. 예수님의 이름으로 기도합니다. 아멘.",
        "references": ["시편 23:1"]
      }
      반드시 마크다운 기호 없이 순수한 JSON 형식으로만 응답해.`;

      const response = await postJSON(`${WORKER_BASE}/ai`, { 
        system: systemPrompt, 
        prompt: text 
      });

      const cleanText = response.text.replace(/```json/g, '').replace(/```/g, '').trim();
      const data = JSON.parse(cleanText);

      latestPayload = data;
      renderAll(data);
      setStatus("ok","완성되었습니다! ✨", false);
      
    }catch(err){
      console.error(err);
      setStatus("bad","오류가 발생했습니다 😢", false);
      outputVerses.innerHTML = `<div class="verse"><div class="why" style="color:red;">앗, 일시적인 오류예요. 다시 시도해 주세요!</div></div>`;
      outputPrayer.innerHTML = ``;
      latestPayload = null;
    }finally{
      btnGo.disabled = false;
    }
  });

  btnCopyAll.addEventListener("click", async () => {
    if(!latestPayload) return;
    try{
      await navigator.clipboard.writeText(buildAllText(latestPayload));
      showToast("클립보드에 복사되었습니다 ✅");
    }catch{
      showToast("복사 실패 ❌");
    }
  });
</script>
</body>
</html>
